name: build uxplay-windows
# Pull requests build artifacts; pushes to main also publish a release.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tmate_debug_enabled:
        description: 'Run the build with tmate debugging enabled'
        default: false
        required: false
        type: boolean
      release_tag:
        description: 'Optional tag to publish a GitHub Release. Leave empty to build artifacts only.'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: build uxplay
    # mDNSResponder's Visual Studio projects are validated with VS 2022.
    # Pin the image so a windows-latest migration cannot break releases.
    runs-on: windows-2022
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: clone the repo
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: configure MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: cache mDNSResponder build artifacts (Bonjour SDK)
        uses: actions/cache@v5
        id: mdns-cache
        with:
          path: |
            Bonjour SDK
          key: mdns-${{ runner.os }}-x64-641cdf73-${{ hashFiles('mdnsresponder-patches/2881.patch', 'mdnsresponder-patches/quote-service-path.patch', 'mdnsresponder-patches/remove-legacy-nat.ps1') }}-v5
          restore-keys: |
            mdns-${{ runner.os }}-x64-641cdf73-

      - name: mDNSResponder compilation
        if: steps.mdns-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          git init mdns2881
          cd mdns2881
          git remote add origin https://github.com/apple-oss-distributions/mDNSResponder.git
          git fetch --depth 1 origin 641cdf73ef46e1824895cbc44ad8ac7647da2479
          git checkout --detach FETCH_HEAD
          cp -v ../mdnsresponder-patches/2881.patch .
          git apply -v 2881.patch
          & ../mdnsresponder-patches/remove-legacy-nat.ps1
          git apply -v ../mdnsresponder-patches/quote-service-path.patch

          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe' `
            .\mDNSWindows\DLL\dnssd.vcxproj /m /t:Build /p:Configuration=Release /p:Platform=x64

          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe' `
            .\mDNSWindows\SystemService\mDNSResponder.vcxproj /m /t:Build /p:Configuration=Release /p:Platform=x64

          New-Item -ItemType Directory -Force -Path '..\Bonjour SDK\Include' | Out-Null
          New-Item -ItemType Directory -Force -Path '..\Bonjour SDK\Lib\x64' | Out-Null
          New-Item -ItemType Directory -Force -Path '..\Bonjour SDK\Bin\x64' | Out-Null

          cp mDNSWindows\DLL\x64\Release\dnssd.dll                    "..\Bonjour SDK\Bin\x64\dnssd.dll"
          cp mDNSWindows\SystemService\x64\Release\mDNSResponder.exe  "..\Bonjour SDK\Bin\x64\mDNSResponder.exe"
          cp mDNSShared\dns_sd.h                                      "..\Bonjour SDK\Include\dns_sd.h"
          cp mDNSWindows\DLL\x64\Release\dnssd.lib                    "..\Bonjour SDK\Lib\x64\dnssd.lib"

          cd ..
          Remove-Item -Recurse -Force mdns2881

      - name: cache msys2 pacman packages
        uses: actions/cache@v5
        with:
          path: |
            C:\msys64\var\cache\pacman\pkg
            C:\msys64\var\lib\pacman\sync
          key: msys2-pacman-${{ runner.os }}-${{ hashFiles('ucrt_x64_dependencies.txt') }}-v2
          restore-keys: |
            msys2-pacman-${{ runner.os }}-

      - name: download+install msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false

      - name: cache pip and python packages
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/pip-cache
            C:\msys64\ucrt64\lib\python*\site-packages\winrt*
          key: pip-winrt-${{ runner.os }}-v2
          restore-keys: |
            pip-winrt-${{ runner.os }}-

      - name: install build dependencies
        shell: msys2 {0}
        run: |
          export PIP_CACHE_DIR="${PWD}/pip-cache"
          mkdir -p "$PIP_CACHE_DIR"

          pacman -S --needed --noconfirm - < ucrt_x64_dependencies.txt

          if ! python -c "import winrt.windows.foundation" 2>/dev/null; then
            pip install \
              winrt-Windows.Foundation \
              winrt-Windows.Foundation.Collections \
              winrt-Windows.Devices.Bluetooth.Advertisement \
              winrt-Windows.Storage.Streams \
              --break-system-packages
          fi

      - name: make release!
        shell: msys2 {0}
        run: |
          where windeployqt
          windeployqt --version
          ./make_release_CI.sh

      - name: where are we?
        run: pwd; ls

      - name: cache dotnet tools (wix)
        uses: actions/cache@v5
        with:
          path: |
            C:\Users\runneradmin\.dotnet\tools
            C:\Users\runneradmin\.nuget\packages
          key: dotnet-tools-${{ runner.os }}-wix-v1
          restore-keys: |
            dotnet-tools-${{ runner.os }}-

      - name: install wix toolset
        shell: powershell
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          if (-not (Get-Command wix -ErrorAction SilentlyContinue)) { dotnet tool install --global wix }
          wix extension add WixToolset.Firewall.wixext -acceptEula wix7

      - name: build msi installer
        shell: powershell
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

          wix extension add WixToolset.UI.wixext -acceptEula wix7

          wix build -acceptEula wix7 product.wxs `
            -arch x64 `
            -out uxplaywindows-installer.msi `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Firewall.wixext

      - name: package portable zip
        shell: powershell
        run: |
          Compress-Archive -Path release\* -DestinationPath uxplay-windows.zip -Force

      - name: upload msi artifact
        uses: actions/upload-artifact@v5
        with:
          name: uxplay-windows-msi
          path: uxplaywindows-installer.msi

      - name: upload portable zip artifact
        uses: actions/upload-artifact@v5
        with:
          name: uxplay-windows-zip
          path: uxplay-windows.zip

  release:
    name: publish release
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: download msi
        uses: actions/download-artifact@v5
        with:
          name: uxplay-windows-msi
          path: dist

      - name: download portable zip
        uses: actions/download-artifact@v5
        with:
          name: uxplay-windows-zip
          path: dist

      - name: compute release metadata
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="v2.1.3-discovery-${{ github.run_number }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          (cd dist && sha256sum uxplaywindows-installer.msi uxplay-windows.zip > SHA256SUMS.txt)

      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: uxplay-windows ${{ steps.release_tag.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: |
            dist/uxplaywindows-installer.msi
            dist/uxplay-windows.zip
            dist/SHA256SUMS.txt
